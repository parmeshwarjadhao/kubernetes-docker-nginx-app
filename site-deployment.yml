apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-static-site
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-static-site
  template:
    metadata:
      labels:
        app: my-static-site
    spec:
      containers:
      - name: nginx
        image: my-static-site:latest
        imagePullPolicy: Never
